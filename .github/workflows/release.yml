name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Fetch third-party binaries (exiftool, ffmpeg)
        run: python packaging/fetch_third_party.py

      - name: Build with PyInstaller
        run: pyinstaller --clean packaging/dedupcollage.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'
        shell: pwsh

      # ----- Future: SignPath Foundation signing step goes here -----
      # - name: Sign installer (SignPath)
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: dedupcollage
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: installer
      #     github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: build_output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build_output/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
